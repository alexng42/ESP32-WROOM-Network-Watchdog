<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Watchdog</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --accent: #38bdf8;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .dashboard {
        background: var(--card);
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 1px solid #334155;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
        color: var(--accent);
        letter-spacing: 1px;
      }
      .status-box {
        font-size: 2rem;
        font-weight: bold;
        margin: 1rem 0;
        color: #4ade80;
      }
      .latency {
        color: #94a3b8;
        font-family: monospace;
      }
      .loader {
        height: 4px;
        background: #334155;
        border-radius: 2px;
        margin-top: 20px;
        overflow: hidden;
      }
      .progress {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 10s linear;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <h1>NETWORK WATCHDOG</h1>
      <div class="status-box" id="status-text">...</div>
      <div class="latency">Ping: <span id="ping-val">0</span>ms</div>
      <div class="loader"><div class="progress" id="bar"></div></div>
      <div
        style="
          margin-top: 20px;
          text-align: left;
          background: #0f172a;
          padding: 10px;
          border-radius: 5px;
        "
      >
        <h3 style="font-size: 0.8rem; color: #94a3b8">RECENT LOGS</h3>
        <pre
          id="log-area"
          style="
            font-size: 0.7rem;
            color: #4ade80;
            max-height: 100px;
            overflow-y: auto;
          "
        ></pre>
      </div>
    </div>

    <script>
      function update() {
        fetch("/api/status")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("status-text").innerText = data.status;
            document.getElementById("status-text").style.color =
              data.status === "ONLINE" ? "#4ade80" : "#f87171";
            document.getElementById("ping-val").innerText = data.latency;

            // Restart the progress bar
            let bar = document.getElementById("bar");
            bar.style.transition = "none";
            bar.style.width = "0%";
            setTimeout(() => {
              bar.style.transition = "width 10s linear";
              bar.style.width = "100%";
            }, 100);
          });
      }

      function updateLogs() {
        fetch("/api/logs")
          .then((res) => res.text())
          .then((data) => {
            const logArea = document.getElementById("log-area");
            logArea.innerText = data;
            logArea.scrollTop = logArea.scrollHeight;
          });
      }
      setInterval(updateLogs, 15000); // check for new logs every 15s
      updateLogs(); // initial load

      setInterval(update, 10000); // update every 10 seconds
      update(); // initial load
    </script>
  </body>
</html>
